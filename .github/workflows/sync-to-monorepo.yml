name: Sync to monorepo

on:
  push:
    branches: [main]

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[skip-reverse-sync]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout standalone repo
        uses: actions/checkout@v4
        with:
          path: standalone

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: MiiFlow/miiflow-web
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Create sync branch and copy files
        run: |
          SHORT_SHA=$(cd standalone && git rev-parse --short HEAD)
          BRANCH="sync/chat-ui-${SHORT_SHA}"

          cd monorepo
          git checkout -b "$BRANCH"

          # Clear target directory and copy standalone contents
          rm -rf packages/chat-ui/*
          rm -rf packages/chat-ui/.[!.]* 2>/dev/null || true
          cp -r ../standalone/. packages/chat-ui/

          # Check for changes
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          COMMIT_SUBJECT=$(cd ../standalone && git log -1 --format='%s')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sync(chat-ui): ${COMMIT_SUBJECT}" -m "[skip-forward-sync]"
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --repo MiiFlow/miiflow-web \
            --base main \
            --head "$BRANCH" \
            --title "sync(chat-ui): ${COMMIT_SUBJECT}" \
            --body "Automated sync from [assistant-ui](https://github.com/MiiFlow/assistant-ui) commit ${SHORT_SHA}.

          [skip-forward-sync]" \
            --label "automated-sync"
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
